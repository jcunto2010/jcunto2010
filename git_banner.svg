<svg viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg" style="display: block; width: 100%; max-width: 800px; margin: 0 auto; background-color: #030406;">
  <defs>
    <!-- Fondo de espacio ultra profundo y minimalista -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#030406"/>
    </radialGradient>
    
    <!-- Resplandor sutil en verde neón (como en tu portafolio) -->
    <radialGradient id="glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#00ff88" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#030406" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Canvas estricto para evitar bordes blancos -->
  <rect width="800" height="250" fill="url(#bg)"/>

  <!-- Centro luminoso animado en verde -->
  <circle cx="400" cy="125" r="140" fill="url(#glow-green)">
    <animate attributeName="r" values="130; 150; 130" dur="6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7; 1; 0.7" dur="6s" repeatCount="indefinite" />
  </circle>

  <!-- Partículas/Estrellas mínimas -->
  <circle cx="200" cy="80" r="1" fill="#00ff88" opacity="0.3">
    <animate attributeName="opacity" values="0.1; 0.6; 0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="180" r="1.5" fill="#ffffff" opacity="0.2">
    <animate attributeName="opacity" values="0.2; 0.7; 0.2" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="190" r="0.8" fill="#ffffff" opacity="0.1">
    <animate attributeName="opacity" values="0.1; 0.5; 0.1" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tipografía Principal en Blanco Puro -->
  <text x="50%" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="10">
    JONATHAN CUNTO DÍAZ
  </text>
  
  <!-- Subtítulo con el verde resaltado de tu portafolio -->
  <text x="50%" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#00ff88" text-anchor="middle" letter-spacing="12">
    FRONTEND DEVELOPER
  </text>
  
  <!-- Pequeña línea decorativa para anclar el diseño -->
  <rect x="385" y="190" width="30" height="2" fill="#00ff88" rx="1" opacity="0.6">
     <animate attributeName="opacity" values="0.3; 0.8; 0.3" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
